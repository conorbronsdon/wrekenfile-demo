VERSION: 2.0.2
METHOD:
  ID: recent.feed.list
  SUMMARY: Feeds
  CANONICAL_ID: recent.feed.list
  DESC: |
    This call returns the most recent `max` feeds, in reverse chronological order.

    Examples:

      - https://api.podcastindex.org/api/1.0/recent/feeds?pretty
      - https://api.podcastindex.org/api/1.0/recent/feeds?max=20&cat=102,health&lang=de,ja&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /recent/feeds
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: since
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: lang
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: cat
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: notcat
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
