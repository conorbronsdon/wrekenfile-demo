VERSION: 2.0.2
METHOD:
  ID: recent.newvaluefeed.list
  SUMMARY: New Value Feeds
  CANONICAL_ID: recent.newvaluefeed.list
  DESC: |
    This call returns feeds that have added a `value` tag in reverse chronological order.

    Example: https://api.podcastindex.org/api/1.0/recent/newvaluefeeds?pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /recent/newvaluefeeds
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: since
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
