VERSION: 2.0.2
METHOD:
  ID: episodes.bypodcastguid.list
  SUMMARY: By Podcast GUID
  CANONICAL_ID: episodes.bypodcastguid.list
  DESC: |
    This call returns all the episodes we know about for this feed from the [Podcast GUID](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md#guid).
    Episodes are in reverse chronological order.

    Example: https://api.podcastindex.org/api/1.0/episodes/bypodcastguid?guid=856cd618-7f34-57ea-9b84-3600f1f65e7f&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /episodes/bypodcastguid
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: guid
    TYPE: STRING
    REQUIRED: true
    LOCATION: query
  - name: since
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: fulltext
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
