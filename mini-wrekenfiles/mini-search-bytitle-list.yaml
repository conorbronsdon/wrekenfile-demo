VERSION: 2.0.2
METHOD:
  ID: search.bytitle.list
  SUMMARY: Search Podcasts by Title
  CANONICAL_ID: search.bytitle.list
  DESC: |
    This call returns all of the feeds where the `title` of the feed matches the search term (ignores case).

    Example "everything everywhere daily" will match the podcast
    [Everything Everywhere Daily](https://podcastindex.org/podcast/437685) by "everything everywhere" will not.

    Example: https://api.podcastindex.org/api/1.0/search/bytitle?q=everything+everywhere+daily&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /search/bytitle
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: q
    TYPE: STRING
    REQUIRED: true
    LOCATION: query
  - name: val
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: clean
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: fulltext
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: similar
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
