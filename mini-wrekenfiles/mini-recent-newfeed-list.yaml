VERSION: 2.0.2
METHOD:
  ID: recent.newfeed.list
  SUMMARY: New Feeds
  CANONICAL_ID: recent.newfeed.list
  DESC: |
    This call returns every new feed added to the index over the past 24 hours in reverse chronological order.

    Examples:

      - https://api.podcastindex.org/api/1.0/recent/newfeeds?pretty
      - https://api.podcastindex.org/api/1.0/recent/newfeeds?pretty&since=1613805000
      - https://api.podcastindex.org/api/1.0/recent/newfeeds?feedid=2653471&pretty
      - https://api.podcastindex.org/api/1.0/recent/newfeeds?feedid=2653471&desc&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /recent/newfeeds
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: since
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: feedid
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: desc
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
