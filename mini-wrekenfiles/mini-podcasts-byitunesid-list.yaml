VERSION: 2.0.2
METHOD:
  ID: podcasts.byitunesid.list
  SUMMARY: By iTunes ID
  CANONICAL_ID: podcasts.byitunesid.list
  DESC: |
    This call returns everything we know about the feed from the iTunes ID

    Example: https://api.podcastindex.org/api/1.0/podcasts/byitunesid?id=1441923632&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /podcasts/byitunesid
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: id
    TYPE: INT
    REQUIRED: true
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
