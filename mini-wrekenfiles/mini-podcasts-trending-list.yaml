VERSION: 2.0.2
METHOD:
  ID: podcasts.trending.list
  SUMMARY: Trending
  CANONICAL_ID: podcasts.trending.list
  DESC: |
    This call returns the podcasts/feeds that in the index that are trending.

    Example: https://api.podcastindex.org/api/1.0/podcasts/trending?pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /podcasts/trending
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: since
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: lang
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: cat
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: notcat
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
