VERSION: 2.0.2
METHOD:
  ID: static.stat.dailyCounts.json.list
  SUMMARY: Stats Daily Counts
  CANONICAL_ID: static.stat.dailyCounts.json.list
  DESC: |
    Report a number of statistics about the feeds in Podcast Index's database. Updated daily.

    A subset of stats can be retrieved using the API endpoint [stats/current](#get-/stats/current).

    View at: https://stats.podcastindex.org/daily_counts.json
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /static/stats/daily_counts.json
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS: {}
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 404)
