VERSION: 2.0.2
METHOD:
  ID: podcasts.bymedium.list
  SUMMARY: By Medium
  CANONICAL_ID: podcasts.bymedium.list
  DESC: |
    This call returns all feeds marked with the specified
    [medium](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md#medium) tag value.

    Example: https://api.podcastindex.org/api/1.0/podcasts/bymedium?medium=music&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /podcasts/bymedium
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: medium
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
