VERSION: 2.0.2
METHOD:
  ID: search.byterm.list
  SUMMARY: Search Podcasts
  CANONICAL_ID: search.byterm.list
  DESC: |
    This call returns all of the feeds that match the search terms in the `title`, `author` or `owner` of the feed.

    Example: https://api.podcastindex.org/api/1.0/search/byterm?q=batman+university&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /search/byterm
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: q
    TYPE: STRING
    REQUIRED: true
    LOCATION: query
  - name: val
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: aponly
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: clean
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: similar
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: fulltext
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
