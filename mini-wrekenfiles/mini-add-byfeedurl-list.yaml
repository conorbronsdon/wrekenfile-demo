VERSION: 2.0.2
METHOD:
  ID: add.byfeedurl.list
  SUMMARY: By Feed URL
  CANONICAL_ID: add.byfeedurl.list
  DESC: |
    This call adds a podcast to the index using its feed url. If a feed already exists, you will get its existing Feed ID returned.

    **NOTE**: this endpoint requires an API Key with the **write** permission.

    Example: https://api.podcastindex.org/api/1.0/add/byfeedurl?url=https://feeds.theincomparable.com/batmanuniversity&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /add/byfeedurl
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: url
    TYPE: STRING
    REQUIRED: true
    LOCATION: query
  - name: chash
    TYPE: STRING
    REQUIRED: true
    LOCATION: query
  - name: itunesid
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
