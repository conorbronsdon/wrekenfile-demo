VERSION: 2.0.2
METHOD:
  ID: hub.pubnotify.list
  SUMMARY: Pub Notify
  CANONICAL_ID: hub.pubnotify.list
  DESC: |
    Notify the index that a feed has changed

    Note: No API key needed for this endpoint.

    Examples:

      - https://api.podcastindex.org/api/1.0/hub/pubnotify?id=920666&pretty
      - https://api.podcastindex.org/api/1.0/hub/pubnotify?url=https://feeds.theincomparable.com/batmanuniversity&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /hub/pubnotify
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS: {}
INPUTS:
  - name: id
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: url
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
