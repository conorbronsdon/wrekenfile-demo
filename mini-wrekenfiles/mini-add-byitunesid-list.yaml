VERSION: 2.0.2
METHOD:
  ID: add.byitunesid.list
  SUMMARY: By iTunes ID
  CANONICAL_ID: add.byitunesid.list
  DESC: |
    This call adds a podcast to the index using its iTunes ID. If a feed already exists, it will be noted in the response.

    **NOTE**: this endpoint requires an API Key with the **write** permission.

    Example: https://api.podcastindex.org/api/1.0/add/byitunesid?id=1441923632&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /add/byitunesid
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: id
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
