VERSION: 2.0.2
METHOD:
  ID: recent.episode.list
  SUMMARY: Episodes
  CANONICAL_ID: recent.episode.list
  DESC: |
    This call returns the most recent `max` number of episodes globally across the whole index,
    in reverse chronological order.

    Example: https://api.podcastindex.org/api/1.0/recent/episodes?max=7&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /recent/episodes
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: excludeString
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: before
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: fulltext
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
