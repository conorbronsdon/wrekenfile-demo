VERSION: 2.0.2
METHOD:
  ID: recent.soundbite.list
  SUMMARY: Soundbites
  CANONICAL_ID: recent.soundbite.list
  DESC: |
    This call returns the most recent `max` soundbites that the index has discovered.

    A soundbite consists of an enclosure url, a start time and a duration.
    It is documented in the [podcast namespace](https://github.com/Podcastindex-org/podcast-namespace/blob/main/docs/1.0.md#soundbite).

    Example: https://api.podcastindex.org/api/1.0/recent/soundbites?pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /recent/soundbites
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
