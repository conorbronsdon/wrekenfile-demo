VERSION: 2.0.2
METHOD:
  ID: episodes.random.list
  SUMMARY: Random
  CANONICAL_ID: episodes.random.list
  DESC: |
    This call returns a random batch of episodes, in no specific order.

    Examples:

      - https://api.podcastindex.org/api/1.0/episodes/random?notcat=News,Religion&lang=en,es&pretty
      - https://api.podcastindex.org/api/1.0/episodes/random?max=2&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /episodes/random
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: max
    TYPE: INT
    REQUIRED: false
    LOCATION: query
  - name: lang
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: cat
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: notcat
    TYPE: STRING
    REQUIRED: false
    LOCATION: query
  - name: fulltext
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
