VERSION: 2.0.2
METHOD:
  ID: search.search.list
  SUMMARY: Search
  CANONICAL_ID: search.search.list
  DESC: |
    Replaces the Apple search API but returns data from the Podcast Index database.

    Note: No API key needed for this endpoint.

    Example:

      - Apple: https://itunes.apple.com/search?media=podcast&entity=podcast&term=batman
      - PodcastIndex: https://api.podcastindex.org/search?term=batman
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /search
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS: {}
INPUTS:
  - name: term
    TYPE: STRING
    REQUIRED: true
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
