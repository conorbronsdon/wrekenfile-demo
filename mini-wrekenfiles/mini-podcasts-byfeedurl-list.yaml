VERSION: 2.0.2
METHOD:
  ID: podcasts.byfeedurl.list
  SUMMARY: By Feed URL
  CANONICAL_ID: podcasts.byfeedurl.list
  DESC: |
    This call returns everything we know about the feed from the feed URL

    Examples:

      - https://api.podcastindex.org/api/1.0/podcasts/byfeedurl?url=https://feeds.theincomparable.com/batmanuniversity&pretty
      - Includes `value` and `funding`: https://api.podcastindex.org/api/1.0/podcasts/byfeedurl?url=https://engineered.network/pragmatic/feed/index.xml&pretty
EXECUTION:
  KIND: http
  MODE: async
  EXECUTION_LEVEL: standalone
HTTP:
  METHOD: GET
  ENDPOINT: /podcasts/byfeedurl
  CONTENT_TYPE: application/json
  ACCEPT: application/json
  HEADERS:
    X-Auth-Key: x-auth-key
    User-Agent: user-agent
    X-Auth-Date: x-auth-date
    Authorization: authorization
INPUTS:
  - name: url
    TYPE: STRING
    REQUIRED: true
    LOCATION: query
  - name: pretty
    TYPE: BOOL
    REQUIRED: false
    LOCATION: query
RETURNS:
  TYPE: VOID
ERRORS:
  - TYPE: ANY
    WHEN: Client error (HTTP 400)
  - TYPE: ANY
    WHEN: Client error (HTTP 401)
